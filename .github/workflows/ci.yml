name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format, lint, test (portable core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (core)
        run: cargo clippy --lib --no-default-features -- -D warnings
      - name: Test (core)
        run: cargo test --lib --no-default-features

  build-windows:
    name: Build & package Windows x86-64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm zip
          cargo install cargo-xwin --locked
      - name: Clippy (Windows target, all)
        run: cargo xwin clippy --target x86_64-pc-windows-msvc --all-targets -- -D warnings
      - name: Package
        run: bash scripts/package-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: eldenring-save-guard-windows
          path: |
            dist/*.zip
            dist/*.sha256

  release:
    name: Attach release artifacts
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm zip
          cargo install cargo-xwin --locked
      - name: Package
        run: bash scripts/package-windows.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
